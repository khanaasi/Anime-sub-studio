<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch Anime Studio - Free Anime Sub/Dub in Hindi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {--bg:#09090b;--header:rgba(18,18,22,0.9);--card-bg:rgba(22,22,26,0.6);--primary:#e50914;--primary-glow:rgba(229,9,20,0.35);--text:#ffffff;--text-muted:#a1a1aa;--border:rgba(255,255,255,0.08);}
    * {box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
    body {background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
    .header {background:var(--header);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
    .header .logo {font-size:22px;font-weight:900;color:var(--primary);cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;}
    .search-bar {flex:1;margin:0 40px;max-width:500px;position:relative;}
    .search-bar input {width:100%;padding:12px 20px 12px 45px;border:1px solid var(--border);border-radius:30px;background:rgba(30,30,35,0.6);color:white;font-size:14px;}
    .search-bar i {position:absolute;left:18px;top:15px;color:#a1a1aa;}
    .sidebar {position:fixed;right:-280px;top:0;width:280px;height:100%;background:rgba(15,15,20,0.98);padding:30px 20px;transition:0.3s;z-index:1000;overflow-y:auto;border-left:1px solid var(--border);}
    .sidebar.open {right:0;}
    .sidebar h3 {font-size:20px;color:var(--primary);border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:20px;font-weight:800;}
    .sidebar a {display:flex;align-items:center;gap:12px;color:white;padding:12px 15px;text-decoration:none;margin:8px 0;border-radius:8px;font-weight:bold;}
    .sidebar a:hover {background:rgba(229,9,20,0.1);color:var(--primary);}
    .overlay {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;display:none;}
    .overlay.show {display:block;}
    .slider-container {margin:25px 30px 5px 30px;display:none;}
    .slider-title {font-size:18px;text-transform:uppercase;font-weight:800;margin-bottom:15px;color:#ffd700;}
    .slider-wrapper {display:flex;gap:20px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:10px;scrollbar-width:none;}
    .slider-wrapper::-webkit-scrollbar {display:none;}
    .slider-card {flex:0 0 240px;background:var(--card-bg);border-radius:12px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border);height:140px;}
    .slider-card img {width:100%;height:100%;object-fit:cover;}
    .slider-card .slider-fallback {width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:15px;text-align:center;background:linear-gradient(-45deg,#1e3a8a,#1e1b4b,#e50914);}
    .slider-card .slider-text {position:absolute;bottom:0;left:0;width:100%;padding:10px;background:rgba(0,0,0,0.75);font-size:12px;font-weight:bold;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .filter-container {display:flex;gap:10px;padding:10px 30px;overflow-x:auto;scrollbar-width:none;}
    .filter-container::-webkit-scrollbar {display:none;}
    .filter-container button {background:rgba(30,30,35,0.6);border:1px solid var(--border);color:white;padding:10px 20px;border-radius:20px;font-weight:bold;cursor:pointer;transition:0.2s;white-space:nowrap;}
    .filter-container button.active, .filter-container button:hover {background:var(--primary);border-color:var(--primary);}
    .section-title {padding:40px 30px 10px 30px;font-size:26px;text-transform:uppercase;font-weight:800;}
    .section-title span {color:var(--primary);}
    .posts-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:25px;padding:20px 30px;}
    .post-card {background:var(--card-bg);border-radius:12px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border);transition:0.3s;}
    .post-card:hover {transform:translateY(-8px);border-color:var(--primary);box-shadow:0 10px 25px var(--primary-glow);}
    .post-card img {width:100%;height:260px;object-fit:cover;}
    .fallback-box {width:100%;height:260px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center;background:linear-gradient(-45deg,#e50914,#121214,#0088cc,#222226);background-size:400% 400%;animation:gradientShift 10s ease infinite;border-bottom:1px solid var(--border);}
    @keyframes gradientShift {0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;}}
    .fallback-box .cat {font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#ffd700;margin-bottom:12px;font-weight:bold;}
    .fallback-box .name-style {font-size:20px;font-weight:900;line-height:1.3;color:#ffffff;text-shadow:0 0 10px rgba(255,255,255,0.3);}
    .post-card .category-tag {position:absolute;top:10px;right:10px;background:var(--primary);color:white;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;}
    .post-card .title-text {padding:15px;font-size:14px;text-align:center;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .detail-page {display:none;padding:40px 30px;max-width:1100px;margin:40px auto;background:rgba(22,22,26,0.8);border-radius:16px;border:1px solid var(--border);}
    .detail-page.active {display:block;}
    .back-btn {background:none;color:var(--primary);border:1px solid var(--border);padding:8px 18px;border-radius:20px;font-size:14px;cursor:pointer;margin-bottom:30px;font-weight:bold;}
    .detail-header {display:flex;gap:40px;flex-wrap:wrap;margin-bottom:40px;}
    .detail-header img {width:260px;border-radius:12px;}
    .detail-info {flex:1;min-width:300px;}
    .detail-info h2 {font-size:34px;margin-bottom:20px;color:var(--primary);font-weight:900;}
    .detail-info p {margin-bottom:14px;font-size:15px;line-height:1.7;color:var(--text-muted);}
    .detail-info p strong {color:white;}
    .episodes {margin-top:40px;background:rgba(15,15,20,0.6);padding:30px;border-radius:12px;border:1px solid var(--border);}
    .episodes h3 {border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:25px;}
    .episodes-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;}
    .episodes button {background:#1f1f23;color:white;border:1px solid var(--border);padding:14px;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.2s;}
    .episodes button:hover {background:var(--primary);border-color:var(--primary);transform:translateY(-3px);}
    .modal {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);justify-content:center;align-items:center;z-index:2000;padding:20px;}
    .modal.active {display:flex;}
    .modal-box {background:#121214;border:1px solid var(--border);padding:40px;border-radius:16px;text-align:center;width:100%;max-width:440px;position:relative;}
    .modal-box h3 {margin-bottom:15px;color:var(--primary);font-size:24px;font-weight:800;}
    .modal-box p {color:var(--text-muted);font-size:14px;margin-bottom:25px;}
    .modal-box input {width:100%;padding:14px;margin-bottom:15px;background:#1a1a1f;border:1px solid var(--border);color:white;border-radius:8px;text-align:center;}
    .modal-box button {background:var(--primary);color:white;padding:14px;border:none;border-radius:8px;margin:8px 0;cursor:pointer;font-weight:bold;width:100%;}
    .close-modal {position:absolute;top:18px;right:18px;font-size:24px;cursor:pointer;color:#777;}
    .seo-tag-cloud {opacity:0.18;font-size:11px;text-align:center;padding:25px;line-height:1.8;border-top:1px solid var(--border);margin-top:50px;}
  </style>
</head>
<body>
  <div class="header">
    <span class="logo" onclick="setHash('home')">AnimeStudio</span>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name..." oninput="searchPosts()">
      <i class="fa-solid fa-magnifying-glass"></i>
    </div>
    <div class="header-right">
      <span class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></span>
    </div>
  </div>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <h3>Filters Menu</h3>
    <a href="#" onclick="showAllPosts()"><i class="fa-solid fa-house"></i> All Anime</a>
    <a href="#" onclick="showSidebarSection('category')"><i class="fa-solid fa-layer-group"></i> Categories</a>
    <a href="#" onclick="showSidebarSection('genre')"><i class="fa-solid fa-masks-theater"></i> Genres</a>
    <a href="#" onclick="showSidebarSection('az')"><i class="fa-solid fa-arrow-down-a-z"></i> A2Z List</a>
    <a href="#" onclick="openPaidRequestPrompt()"><i class="fa-solid fa-key" style="color:#ffd700;"></i> Paid Unlock</a>
    <a href="#" id="tgChannel" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram Channel</a>
    <a href="#" id="tgGroup" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram Group</a>
  </div>
  <div class="slider-container" id="featuredSliderBlock">
    <h3 class="slider-title"><i class="fa-solid fa-star" style="color:#ffd700;"></i> Today's Featured</h3>
    <div class="slider-wrapper" id="featuredSlider"></div>
  </div>
  <div class="filter-container" id="mainFilters">
    <button onclick="setType('all', this)" class="active">All</button>
    <button onclick="setType('anime sub', this)">Anime (Sub)</button>
    <button onclick="setType('anime dub', this)">Anime (Dub)</button>
    <button onclick="setType('k-drama', this)">K-Dramas</button>
    <button onclick="setType('movie', this)">Movies</button>
    <button onclick="setType('series', this)">Web Series</button>
  </div>
  <div id="mainContent">
    <h2 class="section-title" id="gridTitle">All <span>Anime Series</span></h2>
    <div id="postsGrid" class="posts-grid"></div>
    <div id="detailPage" class="detail-page">
      <button class="back-btn" onclick="setHash('home')"><i class="fa-solid fa-arrow-left"></i> Back</button>
      <div id="detailContent"></div>
    </div>
  </div>
  <div class="modal" id="modal"><div class="modal-box" id="modalContent"></div></div>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
  <script>
    const client = new Appwrite.Client().setEndpoint('https://fra.cloud.appwrite.io/v1').setProject('6a562e7f0030aa778863');
    const databases = new Appwrite.Databases(client);
    const account = new Appwrite.Account(client);
    const DB_ID = '6a562f8a001c9d95454a';
    let allPosts = [], settings = {}, currentType = "all", currentSearch = "";
    document.addEventListener("DOMContentLoaded", loadApp);
    async function loadApp() {
      try { await account.get(); } catch (e) { try { await account.createAnonymousSession(); } catch (err) {} }
      try {
        const postRes = await databases.listDocuments(DB_ID, 'Posts');
        allPosts = postRes.documents.map(doc => ({
          id: doc.$id, name: doc.name, image_url: doc.image_url, genres: doc.genres, season: doc.season, short_story: doc.short_story, category: doc.category, release_date: doc.release_date
        }));
        const settingsRes = await databases.listDocuments(DB_ID, 'Settings');
        settingsRes.documents.forEach(doc => { settings[doc.key] = doc.value; });
        document.getElementById("tgChannel").href = settings.channel_link || "#";
        document.getElementById("tgGroup").href = settings.group_link || "#";
        renderPosts(allPosts); buildDailySlider(); setupHistoryRouter();
      } catch(e) { console.error(e); }
    }
    function buildDailySlider() {
      const slider = document.getElementById("featuredSlider"), block = document.getElementById("featuredSliderBlock");
      if (allPosts.length === 0) { block.style.display = "none"; return; }
      const dailyId = Math.floor(Date.now() / 86400000);
      const seededShuffle = [...allPosts].sort((a, b) => {
        const seedA = (a.id.charCodeAt(0) || 1) * dailyId;
        const seedB = (b.id.charCodeAt(0) || 1) * dailyId;
        return (seedA % 10) - (seedB % 10);
      });
      slider.innerHTML = seededShuffle.slice(0, 5).map(p => {
        const media = (p.image_url && p.image_url.trim().startsWith("http")) ? `<img src="${p.image_url}">` : `<div class="slider-fallback">${p.name}</div>`;
        return `<div class="slider-card" onclick="setHash('detail?id=${p.id}')">${media}<div class="slider-text">${p.name}</div></div>`;
      }).join("");
      block.style.display = "block"; startAutoSlider();
    }
    let sliderInterval;
    function startAutoSlider() {
      const wrapper = document.getElementById("featuredSlider");
      const slide = () => { if (wrapper.scrollLeft >= wrapper.scrollWidth - wrapper.clientWidth) wrapper.scrollLeft = 0; else wrapper.scrollLeft += 1; };
      sliderInterval = setInterval(slide, 25);
      wrapper.addEventListener("mouseenter", () => clearInterval(sliderInterval));
      wrapper.addEventListener("mouseleave", () => sliderInterval = setInterval(slide, 25));
    }
    function setupHistoryRouter() {
      window.addEventListener("popstate", handleRouting);
      if (!window.location.hash) window.location.hash = "home"; else handleRouting();
    }
    function setHash(hashStr) { window.location.hash = hashStr; }
    function handleRouting() {
      const hash = window.location.hash.substring(1) || "home";
      document.getElementById("postsGrid").style.display = "none";
      document.getElementById("mainFilters").style.display = "none";
      document.getElementById("featuredSliderBlock").style.display = "none";
      document.getElementById("detailPage").classList.remove("active");
      closeModal();
      if (hash === "home") {
        document.getElementById("postsGrid").style.display = "grid";
        document.getElementById("mainFilters").style.display = "flex";
        if(allPosts.length > 0) document.getElementById("featuredSliderBlock").style.display = "block";
        document.getElementById("gridTitle").innerHTML = "All <span>Anime Series</span>";
        applyFilter();
      } else if (hash.startsWith("detail?id=")) {
        showDetailPage(hash.split("id=")[1]);
      } else if (hash.startsWith("az?type=")) {
        showAzListUI(decodeURIComponent(hash.split("type=")[1]));
      }
    }
    function setType(type, btn) {
      currentType = type;
      document.querySelectorAll(".filter-container button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active"); applyFilter();
    }
    function applyFilter() {
      let filtered = allPosts.filter(a => {
        return ((a.name || "").toLowerCase().includes(currentSearch.toLowerCase()) || (a.genres && a.genres.toLowerCase().includes(currentSearch.toLowerCase()))) && (currentType === "all" || (a.category || "").toLowerCase() === currentType);
      });
      renderPosts(filtered);
    }
    function renderPosts(posts) {
      const grid = document.getElementById("postsGrid");
      if (posts.length === 0) { grid.innerHTML = "<div style='grid-column:1/-1;text-align:center;'>No anime found.</div>"; return; }
      grid.innerHTML = posts.map(p => {
        const media = (p.image_url && p.image_url.trim().startsWith("http")) ? `<img src="${p.image_url}">` : `<div class="fallback-box"><div class="cat">${p.category}</div><div class="name-style">${p.name}</div></div>`;
        return `<div class="post-card" onclick="setHash('detail?id=${p.id}')">${media}<span class="category-tag">${p.category}</span><div class="title-text">${p.name}</div></div>`;
      }).join("");
    }
    async function showDetailPage(postId) {
      const post = allPosts.find(p => p.id === postId); if (!post) return;
      document.getElementById("detailPage").classList.add("active");
      const media = (post.image_url && post.image_url.trim().startsWith("http")) ? `<img src="${post.image_url}">` : `<div class="fallback-box" style="width:260px;border-radius:12px;"><div class="cat">${post.category}</div><div class="name-style">${post.name}</div></div>`;
      document.getElementById("detailContent").innerHTML = `
        <div class="detail-header">${media}<div class="detail-info"><h2>${post.name}</h2><p><strong>Category:</strong> ${post.category}</p><p><strong>Genre:</strong> ${post.genres || "N/A"}</p><p><strong>Season:</strong> ${post.season || "N/A"}</p>${post.release_date?`<p><strong>Release:</strong> ${post.release_date}</p>`:''}<p><strong>Story:</strong> ${post.short_story || "N/A"}</p></div></div><div class="episodes" id="episodesBlock"><h3>Episodes List</h3><div style="padding:20px;text-align:center;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>`;
      try {
        const epRes = await databases.listDocuments(DB_ID,'Episodes',[Appwrite.Query.equal('post_id',postId)]);
        const epGrid = document.getElementById("episodesBlock");
        if (!epRes.documents.length) { epGrid.innerHTML = `<h3>Episodes List</h3><p style="padding:10px;">No episodes published yet.</p>`; } 
        else {
          epGrid.innerHTML = `<h3>Episodes List</h3><div class="episodes-grid">${epRes.documents.map(ep => `<button onclick="handleEpisode('${ep.$id}','${post.name.replace(/'/g,"\\'")}','${ep.episode_label.replace(/'/g,"\\'")}',${ep.original_link?true:false},${ep.play_link?true:false})">${ep.quality?ep.episode_label+' ['+ep.quality+']':ep.episode_label}</button>`).join("")}</div>`;
        }
      } catch (err) { console.error(err); }
    }
    function handleEpisode(epId, postName, epLabel, hasOrig, hasPlay) {
      let html = `<span class="close-modal" onclick="closeModal()">&times;</span><h3>${postName}</h3><p>${epLabel}</p>`;
      if (hasOrig) html += `<button onclick="solveShortener('${epId}')"><i class="fa-solid fa-download"></i> Solve & Download</button>`;
      if (hasPlay) html += `<button onclick="openStreamingPrompt('${epId}')" style="background:#0088cc;"><i class="fa-solid fa-play"></i> Private Stream</button>`;
      if (hasOrig) html += `<button onclick="openPremiumPrompt('${epId}')" style="background:#00b359;"><i class="fa-solid fa-gem"></i> Premium Login</button>`;
      showModal(html);
    }
    async function solveShortener(epId) {
      showModal(`<h3>Shortening Link...</h3><p>Connecting with server routing, please wait...</p>`);
      try {
        const ep = await databases.getDocument(DB_ID, 'Episodes', epId);
        const shRes = await databases.listDocuments(DB_ID, 'Shorteners');
        if (!shRes.documents.length) { window.open(ep.original_link, "_blank"); closeModal(); return; }
        const sh = shRes.documents[Math.floor(Math.random() * shRes.documents.length)];
        let cleanUrl = sh.dashboard_url.replace(/^(https?:\/\/)?(www\.)?/,"").replace(/\/+$/,"");
        const uniqueLink = ep.original_link + (ep.original_link.includes('?') ? '&' : '?') + "asi_uid=" + Math.floor(Date.now()/86400000);
        const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://${cleanUrl}/api?api=${sh.api_key}&url=${encodeURIComponent(uniqueLink)}`)}`);
        const text = await res.text(); let finalLink = null;
        try { const json = JSON.parse(text); finalLink = json.shortenedUrl || json.shortened_url; } catch(e) { if(text.startsWith("http")) finalLink = text.trim(); }
        if (finalLink) {
          const form = document.createElement('form'); form.method = "GET"; form.action = finalLink; form.target = "_blank";
          document.body.appendChild(form); form.submit(); document.body.removeChild(form);
        } else { window.open(ep.original_link, "_blank"); }
        closeModal();
      } catch (e) { alert("Bypass error."); closeModal(); }
    }
    function openStreamingPrompt(epId) { showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>Enter Player Password</h3><input type="text" id="playPassInput" placeholder="Enter key"><button onclick="verifyPlayer('${epId}')">Authenticate & Play</button>`); }
    async function verifyPlayer(epId) {
      const pass = document.getElementById("playPassInput").value.trim();
      if(pass === (settings.player_password || "stream123")) {
        const ep = await databases.getDocument(DB_ID, 'Episodes', epId); window.open(ep.play_link, "_blank"); closeModal();
      } else alert("Wrong Password!");
    }
    function openPremiumPrompt(epId) { showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>Premium Login</h3><input type="email" id="premGmail" placeholder="Gmail ID"><input type="password" id="premPass" placeholder="Password"><button onclick="loginPremium('${epId}')">Login & Bypass</button>`); }
    async function loginPremium(epId) {
      try {
        const res = await databases.listDocuments(DB_ID, 'PremiumUsers', [Appwrite.Query.equal('gmail', document.getElementById("premGmail").value.trim().toLowerCase()), Appwrite.Query.equal('password', document.getElementById("premPass").value.trim())]);
        if (res.documents.length && new Date(res.documents[0].expires_at) > new Date()) {
          const ep = await databases.getDocument(DB_ID, 'Episodes', epId); window.open(ep.original_link, "_blank"); closeModal();
        } else alert("Invalid or Expired!");
      } catch(err) { alert("Bypass failed."); }
    }
    function openPaidRequestPrompt() { toggleSidebar(); showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>Paid Request Unlock</h3><input type="text" id="paidKeyInput" placeholder="Enter key"><button onclick="unlockPaidRequest()">Unlock File</button>`); }
    async function unlockPaidRequest() {
      try {
        const res = await databases.listDocuments(DB_ID, 'PaidRequests', [Appwrite.Query.equal('password', document.getElementById("paidKeyInput").value.trim())]);
        if (res.documents.length) { window.open(res.documents[0].original_link, "_blank"); closeModal(); } else alert("Invalid access key!");
      } catch(e) { alert("Failed."); }
    }
    function searchPosts() { currentSearch = document.getElementById("searchInput").value.trim(); applyFilter(); }
    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
    function showSidebarSection(type) {
      toggleSidebar();
      const items = type === "category" ? [...new Set(allPosts.map(p => p.category))] : type === "genre" ? [...new Set(allPosts.flatMap(p => p.genres ? p.genres.split(",") : []))] : "ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split("");
      showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>${type.toUpperCase()}</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;">${items.map(i => `<button onclick="${type==='az'?'setHash(\'az?type='+encodeURIComponent(i)+'\')':`filterBy${type==='category'?'Cat':'Genre'}(\'${i.trim()}\')`}">${i.trim()}</button>`).join("")}</div>`);
    }
    function filterByCat(cat) { closeModal(); document.getElementById("gridTitle").innerHTML = `Category: <span>${cat}</span>`; renderPosts(allPosts.filter(p => p.category === cat)); }
    function filterByGenre(genre) { closeModal(); document.getElementById("gridTitle").innerHTML = `Genre: <span>${genre}</span>`; renderPosts(allPosts.filter(p => p.genres && p.genres.toLowerCase().includes(genre.toLowerCase()))); }
    function filterByLetter(l) { closeModal(); document.getElementById("gridTitle").innerHTML = `Starting with: <span>${l}</span>`; renderPosts(l==="#"?allPosts.filter(p=>/^[0-9]/.test(p.name)):allPosts.filter(p=>p.name.toUpperCase().startsWith(l))); }
    function showModal(html) { const modal = document.getElementById("modal"); document.getElementById("modalContent").innerHTML = html; modal.classList.add("active"); }
    function closeModal() { document.getElementById("modal").classList.remove("active"); }
  </script>
</body>
</html>
